<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1417">
  <title>{% block title %}DAVAR{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='icons/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script>
    (function () { try { var t = localStorage.getItem('kja_theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) {} })();
  </script>
</head>
<body class="auth-body">
  <div class="auth-shell">
    <aside class="auth-hero">
      <div class="auth-hero__inner">
        <a class="auth-brand" href="{{ url_for('auth.login') }}">
          <span class="auth-brand__mark">✦</span> DAVAR
        </a>
        <p class="auth-tagline">{% block tagline %}Um tempo com a Palavra, todos os dias.{% endblock %}</p>
        <blockquote class="auth-verse">
          “{{ versiculo.texto }}”
          <cite>{{ versiculo.referencia }}</cite>
        </blockquote>
        <p class="auth-note">Sem anúncios. Sem cobranças. Apenas você e a Palavra.</p>
      </div>
    </aside>

    <main class="auth-panel">
      <div class="auth-card">
        {% block form %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
