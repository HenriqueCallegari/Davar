{% extends "base.html" %}
{% block title %}{{ name }} — Capítulos{% endblock %}
{% block content %}
<a class="back-link" href="{{ url_for('bible.livros') }}">← Livros</a>
<div class="page-head">
  <p class="eyebrow">{{ abbrev|upper }}</p>
  <h1>{{ name }}</h1>
  <p>{{ total }} capítulos.</p>
</div>

<div class="chapter-grid">
  {% for i in range(1, total + 1) %}
    <a href="{{ url_for('bible.capitulo', abbrev=abbrev, num=i) }}" class="chapter-tile">{{ i }}</a>
  {% endfor %}
</div>
{% endblock %}
