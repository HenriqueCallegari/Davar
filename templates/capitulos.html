<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>{{ name }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<a href="/" class="voltar">← Livros</a>



<h1>{{ name }}</h1>

<div class="chapter-container">
  {% for i in range(1, total + 1) %}
    <a href="/livro/{{ abbrev }}/capitulo/{{ i }}" class="chapter-card">
      <span class="chapter-number">{{ i }}</span>
      <span class="chapter-label">Capítulo</span>
    </a>
  {% endfor %}
</div>

<style>
.chapter-container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap:14px;
  max-width:800px;
  margin:0 auto;
}

.chapter-card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:18px 0;
  border-radius:14px;
  background:var(--surface);
  text-decoration:none;
  color:var(--text);
  box-shadow:var(--shadow);
  transition:.18s ease;
}

.chapter-card:hover{
  transform:translateY(-6px) scale(1.03);
}

.chapter-number{
  font-size:26px;
  font-weight:700;
  line-height:1;
}

.chapter-label{
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--muted-text);
}
</style>

</body>
</html>
