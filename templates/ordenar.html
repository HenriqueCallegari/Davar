<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ordene os Livros</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="plans-page">
  <a href="/jogos" class="voltar">← Jogos</a>

  <main class="game-shell">
    <section class="plans-hero compact-hero">
      <p class="eyebrow">Memória</p>
      <h1>Ordene os Livros</h1>
      <p class="hero-copy">Clique nos livros na ordem correta em que aparecem na Bíblia.</p>
    </section>

    <div class="quiz-scorebar">
      <div><span>Rodada</span><strong id="roundNum">1</strong></div>
      <div><span>Acertos</span><strong id="hits">0</strong></div>
      <div><span>Erros</span><strong id="miss">0</strong></div>
    </div>

    <div class="order-target" id="target" aria-label="Sequência correta"></div>
    <div class="order-pool" id="pool"></div>

    <div class="quiz-actions">
      <span id="orderFeedback" class="save-status" aria-live="polite">Clique no primeiro livro da sequência.</span>
      <button id="nextRound" class="primary-link button-link" type="button" hidden>Nova rodada →</button>
    </div>
  </main>

  {%- raw %}
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const LIVROS = window.__LIVROS__ || [];
    const RUN = 6;
    const target = document.getElementById("target");
    const pool = document.getElementById("pool");
    const feedback = document.getElementById("orderFeedback");
    const nextBtn = document.getElementById("nextRound");
    const roundEl = document.getElementById("roundNum");
    const hitsEl = document.getElementById("hits");
    const missEl = document.getElementById("miss");

    let round = 1, hits = 0, miss = 0;
    let sequence = [], expected = 0;

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function novaRodada() {
      const maxStart = Math.max(0, LIVROS.length - RUN);
      const start = Math.floor(Math.random() * (maxStart + 1));
      sequence = LIVROS.slice(start, start + RUN);
      expected = 0;
      nextBtn.hidden = true;
      feedback.textContent = "Clique no primeiro livro da sequência.";
      feedback.classList.remove("is-saved");
      roundEl.textContent = round;

      target.innerHTML = "";
      sequence.forEach(() => {
        const slot = document.createElement("div");
        slot.className = "order-slot";
        target.appendChild(slot);
      });

      pool.innerHTML = "";
      shuffle(sequence).forEach(nome => {
        const chip = document.createElement("button");
        chip.className = "order-chip";
        chip.type = "button";
        chip.textContent = nome;
        chip.addEventListener("click", () => escolher(chip, nome));
        pool.appendChild(chip);
      });
    }

    function escolher(chip, nome) {
      if (chip.disabled) return;
      if (nome === sequence[expected]) {
        chip.disabled = true;
        chip.classList.add("done");
        const slot = target.children[expected];
        slot.textContent = nome;
        slot.classList.add("filled");
        expected++;
        hits++; hitsEl.textContent = hits;
        if (expected === sequence.length) {
          feedback.textContent = "Sequência completa! 🎉";
          feedback.classList.add("is-saved");
          nextBtn.hidden = false;
          round++;
        } else {
          feedback.textContent = "Isso! Próximo…";
        }
      } else {
        miss++; missEl.textContent = miss;
        chip.classList.add("shake");
        feedback.textContent = "Ainda não — tente outro.";
        setTimeout(() => chip.classList.remove("shake"), 400);
      }
    }

    nextBtn.addEventListener("click", novaRodada);
    novaRodada();
  });
  </script>
  {% endraw %}
  <script>
    window.__LIVROS__ = {{ livros | tojson }};
  </script>
</body>
</html>
